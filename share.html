<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bagikan Undangan</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7ead8;
      color: #3a2a1c;
      padding: 20px;
    }

    .container {
      max-width: 750px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    h1 {
      text-align: center;
      color: #8a5a2b;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 18px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 14px;
    }

    textarea {
      min-height: 110px;
    }

    button, .btn {
      width: 100%;
      padding: 13px;
      margin-top: 12px;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: block;
      text-align: center;
      box-sizing: border-box;
      color: white;
    }

    .gold { background: #c59d5f; }
    .copy { background: #444; }
    .wa { background: #25D366; }
    .ig { background: #E1306C; }

    .guest-card {
      background: #fff8ee;
      border: 1px solid #ead7b8;
      padding: 15px;
      border-radius: 15px;
      margin-top: 18px;
    }

    .guest-card h3 {
      margin: 0 0 10px;
      color: #8a5a2b;
    }

    .link {
      word-break: break-all;
      font-size: 13px;
      color: #6b4a2c;
      margin: 10px 0;
    }

    .preview {
      white-space: pre-wrap;
      background: #fff;
      padding: 12px;
      border-radius: 10px;
      border: 1px dashed #c59d5f;
      font-size: 13px;
      text-align: left;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Bagikan Undangan</h1>

  <label>Jenis Acara</label>
  <select id="jenisAcara">
    <option value="pawiwahan">Pawiwahan</option>
    <option value="metatah">Potong Gigi / Metatah</option>
    <option value="tigabulanan">3 Bulanan</option>
  </select>

  <label>Nama Acara / ID Undangan</label>
  <input type="text" id="idUndangan" value="pawiwahan-kripa">

  <label>Link Undangan Utama</label>
  <input type="text" id="linkUtama" value="https://undangan-online-wahkiss.vercel.app/">

  <label>Link Input Nama Tamu</label>
  <input type="text" id="linkShare" value="https://undangan-online-wahkiss.vercel.app/share.html">

  <label>Link Cara Mengirim Undangan</label>
  <input type="text" id="linkTutorial" value="https://www.youtube.com/shorts/oNT81kX1zqM">

  <label>Link Pantau Ucapan & Kehadiran Tamu</label>
  <input type="text" id="linkRsvp" value="https://undangan-online-wahkiss.vercel.app/rsvp.html">

  <label>Tanggal</label>
  <input type="text" id="tanggal" placeholder="Contoh: Sabtu, 22 Juni 2026">

  <label>Waktu</label>
  <input type="text" id="waktu" placeholder="Contoh: 10.00 WITA - selesai">

  <label>Tempat</label>
  <input type="text" id="tempat" placeholder="Contoh: Denpasar, Bali">

  <label>Daftar Nama Tamu</label>
  <textarea id="daftarNama" placeholder="Contoh:
Tamu Undangan
Bapak Made & Ibu
Keluarga Besar Pak Wayan"></textarea>

  <button class="gold" onclick="buatDaftar()">Buat Daftar Undangan</button>

  <div id="hasil"></div>
</div>

<script>
function namaJenisAcara(jenis) {
  if (jenis === "pawiwahan") return "pawiwahan";
  if (jenis === "metatah") return "potong gigi / metatah";
  if (jenis === "tigabulanan") return "3 bulanan";
  return "acara";
}

function buatDaftar() {
  const jenis = document.getElementById("jenisAcara").value;
  const namaAcara = namaJenisAcara(jenis);

  const idUndangan = document.getElementById("idUndangan").value.trim();
  const linkUtama = document.getElementById("linkUtama").value.trim();
  const linkShare = document.getElementById("linkShare").value.trim();
  const linkTutorial = document.getElementById("linkTutorial").value.trim();
  const linkRsvp = document.getElementById("linkRsvp").value.trim();

  const tanggal = document.getElementById("tanggal").value.trim();
  const waktu = document.getElementById("waktu").value.trim();
  const tempat = document.getElementById("tempat").value.trim();

  const daftarNama = document.getElementById("daftarNama").value.trim();
  const hasil = document.getElementById("hasil");

  if (!daftarNama) {
    alert("Masukkan daftar nama tamu dulu");
    return;
  }

  hasil.innerHTML = "";

  const namaArray = daftarNama
    .split("\n")
    .map(nama => nama.trim())
    .filter(nama => nama !== "");

  namaArray.forEach((nama, index) => {
    const linkUndangan = linkUtama + "?to=" + encodeURIComponent(nama);

    const pesan = `Halo kak,

Ini hasil undangan ${namaAcara}nya nggih kak 🙏🏻😊

*Link Undangan:*

* ${linkUndangan}

*Detail Acara:*

Tanggal: ${tanggal}
Waktu: ${waktu}
Tempat: ${tempat}

*Berikut merupakan link untuk menambahkan nama tamu:*

Link Input Nama Tamu:

* ${linkShare}

*Cara Input nama tamu:*

1. Klik Link Input Nama Tamu
2. Masukkan nama tamu
3. Klik Buat Link Undangan
4. Klik Bagikan Via WA / Sosmed

Cara Mengirim Undangan
Kakak bisa tonton menggunakan tautan dibawah ini ya kak.. 😄
${linkTutorial}

Pantau Ucapan & Kehadiran tamu:

* ${linkRsvp}

Jika ada kebingungan atau kendala jangan ragu untuk menghubungi kami kembali nggih.. 🙏`;

    const encodedPesan = encodeURIComponent(pesan);

    hasil.innerHTML += `
      <div class="guest-card">
        <h3>${index + 1}. ${nama}</h3>

        <div class="link">${linkUndangan}</div>

        <div class="preview">${pesan}</div>

        <button class="copy" onclick="copyText(\`${linkUndangan}\`)">
          Copy Link Undangan
        </button>

        <button class="copy" onclick="copyText(\`${pesan}\`)">
          Copy Format Text
        </button>

        <a class="btn wa" href="https://wa.me/?text=${encodedPesan}" target="_blank">
          Bagikan via WhatsApp
        </a>

        <a class="btn ig" href="https://www.instagram.com/" target="_blank">
          Buka Instagram
        </a>
      </div>
    `;
  });
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("Berhasil dicopy");
}
</script>

</body>
</html>
