<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generator Link Undangan</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    .box {
      max-width: 450px;
      margin: auto;
      background: #1d1d1d;
      padding: 25px;
      border-radius: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      margin: 15px 0;
      box-sizing: border-box;
    }

    button, a {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      border-radius: 30px;
      border: none;
      text-decoration: none;
      color: white;
      font-weight: bold;
      box-sizing: border-box;
    }

    .generate {
      background: #c59d5f;
    }

    .copy {
      background: #444;
    }

    .wa {
      background: #25D366;
    }

    .ig {
      background: #E1306C;
    }

    #linkText {
      margin-top: 20px;
      word-break: break-all;
      font-size: 14px;
      color: #f5d58a;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Daftar Link Undangan</h2>
    <p>Masukkan nama tamu:</p>

    <input type="text" id="nama" placeholder="Contoh: Bapak Made & Ibu">

    <button class="generate" onclick="buatLink()">Buat Link Undangan</button>

    <p id="linkText"></p>

    <button class="copy" onclick="copyLink()">Copy Link</button>

    <a id="waShare" class="wa" href="#" target="_blank">
      Share ke WhatsApp
    </a>

    <a id="igShare" class="ig" href="https://www.instagram.com/" target="_blank">
      Buka Instagram
    </a>
  </div>

  <script>
    let finalLink = "";

    function buatLink() {
      const nama = document.getElementById("nama").value.trim();

      if (!nama) {
        alert("Isi nama tamu dulu");
        return;
      }

      const encodedNama = encodeURIComponent(nama);
      finalLink = window.location.origin + "/?to=" + encodedNama;

      document.getElementById("linkText").innerText = finalLink;

      const pesanWA =
        "Halo kak,%0A%0A" +
        "Berikut link undangan kami:%0A" +
        finalLink + "%0A%0A" +
        "Terima kasih 🙏";

      document.getElementById("waShare").href =
        "https://wa.me/?text=" + pesanWA;
    }

    function copyLink() {
      if (!finalLink) {
        alert("Buat link dulu");
        return;
      }

      navigator.clipboard.writeText(finalLink);
      alert("Link berhasil dicopy");
    }
  </script>

</body>
</html>
