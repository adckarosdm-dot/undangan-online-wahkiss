<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generator Text Undangan</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7ead8;
      color: #3a2a1c;
      padding: 20px;
    }

    .container {
      max-width: 760px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    h1 {
      text-align: center;
      color: #8a5a2b;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 18px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 14px;
    }

    textarea {
      min-height: 120px;
    }

    button, .btn {
      width: 100%;
      padding: 13px;
      margin-top: 12px;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: block;
      text-align: center;
      box-sizing: border-box;
      color: white;
    }

    .gold { background: #c59d5f; }
    .copy { background: #444; }
    .wa { background: #25D366; }
    .ig { background: #E1306C; }

    .guest-card {
      background: #fff8ee;
      border: 1px solid #ead7b8;
      padding: 15px;
      border-radius: 15px;
      margin-top: 18px;
    }

    .guest-card h3 {
      margin: 0 0 10px;
      color: #8a5a2b;
    }

    .link {
      word-break: break-all;
      font-size: 13px;
      color: #6b4a2c;
      margin: 10px 0;
    }

    .preview {
      white-space: pre-wrap;
      background: #fff;
      padding: 12px;
      border-radius: 10px;
      border: 1px dashed #c59d5f;
      font-size: 13px;
      text-align: left;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Generator Text Undangan</h1>

  <label>Pilihan Undangan</label>
  <select id="template">
    <option value="english">English Romantic</option>
    <option value="formal">Formal</option>
    <option value="hindu">Hindu</option>
    <option value="hindu2">Hindu 2</option>
    <option value="metatahFormal">Metatah Formal</option>
    <option value="metatahHindu">Metatah Hindu</option>
  </select>

  <label>Judul Undangan</label>
  <input type="text" id="judul" placeholder="Contoh: Krisna & Ayu">

  <label>Link Undangan Utama</label>
  <input type="text" id="linkUtama" value="https://undangan-online-wahkiss.vercel.app/">

  <label>Hari/Tanggal</label>
  <input type="text" id="tanggal" placeholder="Contoh: Sabtu, 22 Juni 2026">

  <label>Waktu</label>
  <input type="text" id="waktu" placeholder="Contoh: 10.00 WITA - selesai">

  <label>Tempat</label>
  <input type="text" id="tempat" placeholder="Contoh: Denpasar, Bali">

  <label>Daftar Nama Tamu</label>
  <textarea id="daftarNama" placeholder="Satu nama satu baris, contoh:
Bapak Made & Ibu
Keluarga Pak Wayan
Komang Ari"></textarea>

  <button class="gold" onclick="buatDaftar()">Buat Daftar Undangan</button>

  <div id="hasil"></div>
</div>

<script>
function buatPesan(template, nama, link, judul, tanggal, waktu, tempat) {
  if (template === "english") {
    return `Without diminishing our respect, we would like to extend our sincere invitation to ${nama} to attend our wedding ceremony.

Please find our complete wedding details through the link below:
${link}

It would be an honor for us if you could grace our special day with your presence and blessings.

Thank you.

Respectfully,
${judul}`;
  }

  if (template === "formal") {
    return `Tanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i, *${nama}* untuk menghadiri acara pernikahan kami.

*Berikut link undangan kami*, untuk info lengkap dari acara, bisa kunjungi:

${link}

Merupakan suatu kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan untuk hadir dan memberikan doa restu.

Terima Kasih

Hormat kami,
${judul}`;
  }

  if (template === "hindu") {
    return `Kepada Yth.
*${nama}*

Om Swastiastu

Tanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i, teman sekaligus sahabat, untuk menghadiri acara pernikahan kami :

Berikut link undangan kami untuk info lengkap dari acara bisa kunjungi :

${link}

Merupakan suatu kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan untuk hadir dan memberikan doa restu.

Om Shanti, Shanti, Shanti, Om.`;
  }

  if (template === "hindu2") {
    return `Kepada Yth.
*${nama}*

Om Swastiastu,
Tanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i, teman sekaligus sahabat, dalam acara Upacara Manusa Yadnya Pawiwahan (Pernikahan) kami yang dilaksanakan pada:

Hari/Tgl: ${tanggal}
Waktu: ${waktu}
Tempat: ${tempat}

Kami sangat mengharapkan kehadiran Bapak/Ibu/Saudara/i untuk memberikan doa restu dalam acara kami.

Berikut link undangan kami untuk info lengkap dari acara bisa kunjungi :

${link}

Merupakan suatu kehormatan & kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan untuk hadir dan memberikan doa restu.

Om Shanti, Shanti, Shanti, Om.`;
  }

  if (template === "metatahFormal") {
    return `Tanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i, *${nama}* untuk menghadiri acara potong gigi kami.

*Berikut link undangan kami*, untuk info lengkap dari acara, bisa kunjungi:

${link}

Merupakan suatu kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan untuk hadir dan memberikan doa restu.

Terima Kasih

Hormat kami,
${judul}`;
  }

  if (template === "metatahHindu") {
    return `Kepada Yth.
*${nama}*

Om Swastiastu

Tanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i, teman sekaligus sahabat, untuk menghadiri acara metatah (potong gigi) kami :

Berikut link undangan kami untuk info lengkap dari acara bisa kunjungi :

${link}

Merupakan suatu kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan untuk hadir dan memberikan doa restu.

Om Shanti, Shanti, Shanti, Om.`;
  }
}

function buatDaftar() {
  const template = document.getElementById("template").value;
  const judul = document.getElementById("judul").value.trim() || "Undangan Kami";
  const linkUtama = document.getElementById("linkUtama").value.trim();
  const tanggal = document.getElementById("tanggal").value.trim();
  const waktu = document.getElementById("waktu").value.trim();
  const tempat = document.getElementById("tempat").value.trim();
  const daftarNama = document.getElementById("daftarNama").value.trim();
  const hasil = document.getElementById("hasil");

  if (!daftarNama) {
    alert("Masukkan daftar nama tamu dulu");
    return;
  }

  hasil.innerHTML = "";

  const namaArray = daftarNama
    .split("\n")
    .map(nama => nama.trim())
    .filter(nama => nama !== "");

  namaArray.forEach((nama, index) => {
    const link = linkUtama + "?to=" + encodeURIComponent(nama);
    const pesan = buatPesan(template, nama, link, judul, tanggal, waktu, tempat);
    const encodedPesan = encodeURIComponent(pesan);

    hasil.innerHTML += `
      <div class="guest-card">
        <h3>${index + 1}. ${nama}</h3>

        <div class="link">${link}</div>

        <div class="preview">${pesan}</div>

        <button class="copy" onclick="copyText(\`${link}\`)">
          Copy Link Undangan
        </button>

        <button class="copy" onclick="copyText(\`${pesan}\`)">
          Copy Format Text
        </button>

        <a class="btn wa" href="https://wa.me/?text=${encodedPesan}" target="_blank">
          Bagikan via WhatsApp
        </a>

        <a class="btn ig" href="https://www.instagram.com/" target="_blank">
          Buka Instagram
        </a>
      </div>
    `;
  });
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("Berhasil dicopy");
}
</script>

</body>
</html>
