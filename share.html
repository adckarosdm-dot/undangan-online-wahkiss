<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bagikan Undangan</title>

<style>
body {
  font-family: Arial;
  background: #f7ead8;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 20px;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 20px;
  border: none;
  background: #c59d5f;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.guest {
  background: #fff8ee;
  margin-top: 20px;
  padding: 15px;
  border-radius: 15px;
}

a {
  display: block;
  margin-top: 10px;
  padding: 10px;
  text-align: center;
  border-radius: 20px;
  text-decoration: none;
  color: white;
}

.wa { background: #25D366; }
.copy { background: #444; }
</style>
</head>

<body>

<div class="container">
<h2>Generator Undangan</h2>

<label>Jenis Acara</label>
<select id="jenis">
  <option value="pawiwahan">Pawiwahan</option>
  <option value="metatah">Potong Gigi</option>
  <option value="tigabulan">3 Bulanan</option>
</select>

<label>Tanggal</label>
<input type="text" id="tanggal" placeholder="22 Juni 2026">

<label>Waktu</label>
<input type="text" id="waktu" placeholder="10.00 WITA">

<label>Tempat</label>
<input type="text" id="tempat" placeholder="Denpasar, Bali">

<label>Nama Tamu (pisahkan baris)</label>
<textarea id="nama"></textarea>

<button onclick="generate()">Buat Undangan</button>

<div id="hasil"></div>
</div>

<script>

function generate() {
  let jenis = document.getElementById("jenis").value;
  let tanggal = document.getElementById("tanggal").value;
  let waktu = document.getElementById("waktu").value;
  let tempat = document.getElementById("tempat").value;
  let namaList = document.getElementById("nama").value.split("\n");

  let hasil = document.getElementById("hasil");
  hasil.innerHTML = "";

  namaList.forEach(nama => {
    nama = nama.trim();
    if (!nama) return;

    let link = window.location.origin + "/?to=" + encodeURIComponent(nama);

    let pesan = "";

    if (jenis === "pawiwahan") {
      pesan = `Om Swastyastu 🙏

Halo ${nama},

Kami mengundang Bapak/Ibu/Saudara/i untuk hadir dalam acara Pawiwahan kami.

Hari/Tanggal: ${tanggal}
Waktu: ${waktu}
Tempat: ${tempat}

Berikut link undangan:
${link}

Om Shanti, Shanti, Shanti Om 🙏`;
    }

    if (jenis === "metatah") {
      pesan = `Om Swastyastu 🙏

Halo ${nama},

Kami mengundang untuk hadir dalam acara Potong Gigi (Metatah).

Hari/Tanggal: ${tanggal}
Waktu: ${waktu}
Tempat: ${tempat}

Link undangan:
${link}

Om Shanti, Shanti, Shanti Om 🙏`;
    }

    if (jenis === "tigabulan") {
      pesan = `Om Swastyastu 🙏

Halo ${nama},

Kami mengundang untuk hadir dalam acara 3 Bulanan.

Hari/Tanggal: ${tanggal}
Waktu: ${waktu}
Tempat: ${tempat}

Link undangan:
${link}

Om Shanti, Shanti, Shanti Om 🙏`;
    }

    let encoded = encodeURIComponent(pesan);

    hasil.innerHTML += `
      <div class="guest">
        <b>${nama}</b>
        <p>${link}</p>

        <button class="copy" onclick="copyText(\`${pesan}\`)">Copy Text</button>

        <a class="wa" href="https://wa.me/?text=${encoded}" target="_blank">
          Kirim WhatsApp
        </a>
      </div>
    `;
  });
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("Tersalin");
}

</script>

</body>
</html>
