<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bagikan Undangan</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7ead8;
      color: #3a2a1c;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    h1 {
      text-align: center;
      color: #8a5a2b;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 20px;
    }

    textarea,
    input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
    }

    button,
    .btn {
      width: 100%;
      padding: 13px;
      margin-top: 12px;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: block;
      text-align: center;
      box-sizing: border-box;
    }

    .gold { background: #c59d5f; color: white; }
    .copy { background: #444; color: white; }
    .wa { background: #25D366; color: white; }
    .ig { background: #E1306C; color: white; }

    .guest-card {
      background: #fff8ee;
      border: 1px solid #ead7b8;
      padding: 15px;
      border-radius: 15px;
      margin-top: 15px;
    }

    .guest-card h3 {
      margin: 0 0 10px;
      color: #8a5a2b;
    }

    .link {
      word-break: break-all;
      font-size: 13px;
      color: #6b4a2c;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Bagikan Undangan</h1>

  <label>Masukkan daftar nama tamu</label>
  <textarea id="daftarNama" placeholder="Contoh:
Bapak Made & Ibu
Komang Ari
Keluarga Besar Pak Wayan"></textarea>

  <label>Format pesan undangan</label>
  <textarea id="formatPesan">Halo kak,

Ini undangan pawiwahan kami nggih 🙏😊

Kepada Yth:
{nama}

Berikut link undangannya:
{link}

Merupakan suatu kehormatan bagi kami apabila berkenan hadir dan memberikan doa restu.

Om Shanti, Shanti, Shanti Om 🙏</textarea>

  <button class="gold" onclick="buatDaftar()">Buat Daftar Nama Tamu</button>

  <div id="hasil"></div>
</div>

<script>
  function buatDaftar() {
    const daftarNama = document.getElementById("daftarNama").value.trim();
    const formatPesan = document.getElementById("formatPesan").value;

    if (!daftarNama) {
      alert("Masukkan nama tamu dulu");
      return;
    }

    const namaArray = daftarNama.split("\n").filter(nama => nama.trim() !== "");
    const hasil = document.getElementById("hasil");
    hasil.innerHTML = "";

    namaArray.forEach((nama, index) => {
      const namaBersih = nama.trim();
      const link = window.location.origin + "/?to=" + encodeURIComponent(namaBersih);

      const pesan = formatPesan
        .replaceAll("{nama}", namaBersih)
        .replaceAll("{link}", link);

      const encodedPesan = encodeURIComponent(pesan);

      hasil.innerHTML += `
        <div class="guest-card">
          <h3>${index + 1}. ${namaBersih}</h3>

          <div class="link">${link}</div>

          <button class="copy" onclick="copyText('${link}')">
            Copy Link
          </button>

          <button class="copy" onclick="copyText(\`${pesan}\`)">
            Copy Format Text
          </button>

          <a class="btn wa" href="https://wa.me/?text=${encodedPesan}" target="_blank">
            Bagikan via WhatsApp
          </a>

          <a class="btn ig" href="https://www.instagram.com/" target="_blank">
            Buka Instagram
          </a>
        </div>
      `;
    });
  }

  function copyText(text) {
    navigator.clipboard.writeText(text);
    alert("Berhasil dicopy");
  }
</script>

</body>
</html>
